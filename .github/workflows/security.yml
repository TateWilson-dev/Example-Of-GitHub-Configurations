name: security
on:
  pull_request:
  push:
    branches: ["**"]
permissions:
  contents: read
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so gitleaks can scan all commits
      - name: Gitleaks scan
        run: >
          docker run --rm -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:latest git /repo --redact
